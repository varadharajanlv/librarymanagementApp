<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading well — School Library Management Platform</title>

  <!-- Required CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root{
      --navy:#1F3864;
      --blue:#2E75B6;
      --teal:#1B6B74;
      --purple:#6B4C9A;
      --darkBlue:#1A4A7A;
      --gold:#C49A1E;
      --bg:#F0F4F8;
      --card:#FFFFFF;
      --success:#1B6B74;
      --error:#C00000;
      --warning:#C49A1E;

      --shadow: 0 10px 30px rgba(31,56,100,0.12);
      --radius: 12px;
      --btnRadius: 8px;
      --font:'Segoe UI', Arial, sans-serif;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: var(--font);
      background:
        radial-gradient(1200px 600px at 12% 8%, rgba(46,117,182,0.14), transparent 55%),
        radial-gradient(900px 520px at 92% 12%, rgba(196,154,30,0.10), transparent 55%),
        radial-gradient(900px 560px at 86% 92%, rgba(31,56,100,0.10), transparent 55%),
        var(--bg);
      color:#1f2937;
    }

    button,input,select{ font-family: var(--font); }

    .appRoot{ min-height:100vh; }

    .tableWrap{ width:100%; overflow:auto; border-radius:12px; border:1px solid rgba(31,56,100,0.10); background:#fff; }
    table{ width:100%; border-collapse:separate; border-spacing:0; }
    thead th{ position:sticky; top:0; z-index:2; background:linear-gradient(180deg,#fff 0%, #f8fafc 100%); text-align:left; font-size:12px; letter-spacing:0.2px; color:#334155; padding:12px; border-bottom:1px solid rgba(31,56,100,0.10); }
    tbody td{ padding:12px; border-bottom:1px solid rgba(31,56,100,0.06); font-size:13px; color:#0f172a; }
    tbody tr:nth-child(2n) td{ background:#fbfdff; }
    tbody tr:hover td{ background:#f2f7ff; }
    .muted{ color:#64748b; }
    .chip{ display:inline-flex; align-items:center; padding:6px 10px; border-radius:999px; font-weight:700; font-size:12px; border:1px solid rgba(0,0,0,0.06); }
    .shadowCard{ background:var(--card); border-radius:12px; box-shadow: var(--shadow); border:1px solid rgba(31,56,100,0.08); }
    .btn{ border:none; border-radius:var(--btnRadius); cursor:pointer; transition: all .2s; }
    .btn:disabled{ opacity:0.65; cursor:not-allowed; }
    .input{ width:100%; padding:10px 12px; border-radius:10px; border:1px solid rgba(31,56,100,0.18); background:#fff; outline:none; }
    .input:focus{ box-shadow: 0 0 0 3px rgba(46,117,182,0.18); border-color: rgba(46,117,182,0.55); }
    .linkBtn{ background:transparent; border:none; cursor:pointer; color:inherit; padding:0; font:inherit; }
    .fadeIn{ animation: fadeIn .18s ease-out; }
    @keyframes fadeIn{ from{ opacity:0; transform: translateY(4px); } to{ opacity:1; transform: translateY(0); } }

    .spinner{
      width:18px; height:18px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,0.35);
      border-top-color:#fff;
      animation: spin 0.8s linear infinite;
      display:inline-block;
      vertical-align:middle;
    }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    /* Modal */
    .modalOverlay{
      position:fixed; inset:0;
      background: rgba(15,23,42,0.55);
      display:flex; align-items:center; justify-content:center;
      padding:18px; z-index: 50;
    }
    .modalCard{
      width:min(520px, 96vw);
      background:#fff; border-radius:16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      border:1px solid rgba(31,56,100,0.12);
      padding:18px;
    }

    /* Responsive */
    .mobileOnly{ display:none; }
    .desktopOnly{ display:initial; }

    @media (max-width: 980px){
      .loginSplit{ flex-direction:column; }
      .loginLeft,.loginRight{ width:100% !important; min-height:auto !important; }
      .loginLeft{ padding:36px 22px !important; }
      .loginRight{ padding:32px 18px !important; }
    }

    @media (max-width: 900px){
      .mobileOnly{ display:initial; }
      .desktopOnly{ display:none; }
      .appContent{ margin-left:0 !important; }
      .topNav{ left:0 !important; }
      .sidebarFixed{
        position:fixed !important;
        z-index:60 !important;
        transform: translateX(-110%);
        transition: transform .2s ease;
      }
      .sidebarFixed.open{ transform: translateX(0); }
      .sidebarOverlay{
        position:fixed; inset:0;
        background: rgba(15,23,42,0.55);
        z-index:55;
      }
    }

    @media (max-width: 720px){
      .grid4{ grid-template-columns:1fr 1fr !important; }
      .grid2{ grid-template-columns:1fr !important; }
      .stackRow{ flex-direction:column !important; align-items:stretch !important; }
      .hideSm{ display:none !important; }
    }

    @media (max-width: 420px){
      .grid4{ grid-template-columns:1fr !important; }
    }
  </style>
</head>

    const COLORS = {
      primaryNavy: "#243B67",   // navy from logo
      blue: "#2E75B6",
      teal: "#2E7D32",          // green from logo
      purple: "#6B4C9A",
      darkBlue: "#1A4A7A",
      gold: "#C49A1E",
      background: "#F0F4F8",
      card: "#FFFFFF",
      success: "#2E7D32",
      error: "#C00000",
      warning: "#C49A1E",
    };

    const CEFR_COLORS = {
      "Pre-A1": "#9E9E9E",
      "A1": "#4CAF50",
      "A2": "#2E7D32",
      "B1": "#2E75B6",

      "C2": "#C00000",
    };

    const DEMO_ACCOUNTS = [
      { role:"School Admin", email:"admin@ebak.com", password:"Admin@123", color: COLORS.blue },

      { role:"Management", email:"management@ebak.com", password:"Mgmt@123", color: COLORS.darkBlue },
    ];

    // ---------- Small UI helpers ----------
    const Pill = ({ text, bg, color="#fff", borderColor="transparent", style={} }) => (
      <span className="chip" style={{ background:bg, color, borderColor, ...style }}>{text}</span>
    );

    const Button = ({ children, onClick, style={}, variant="primary", disabled=false, title }) => {
      const base = {
        padding:"10px 12px",
        fontWeight:800,
        letterSpacing:"0.2px",
        borderRadius: 10,
        cursor: disabled ? "not-allowed" : "pointer",
        boxShadow: "0 10px 22px rgba(31,56,100,0.12)",
      };
      const variants = {
        primary: { background: COLORS.primaryNavy, color:"#fff", border:"none" },
        red: { background: "#E21B23", color:"#fff", border:"none" },
        teal: { background: COLORS.teal, color:"#fff", border:"none" },
        ghost: { background:"#fff", color: COLORS.primaryNavy, border:"1px solid rgba(31,56,100,0.18)", boxShadow:"none" },
        warning: { background: COLORS.gold, color:"#1f2937", border:"none" },
      };
      return (
        <button
          className="btn"
          title={title}
          disabled={disabled}
          onClick={disabled ? undefined : onClick}
          style={{ ...base, ...variants[variant], ...style, opacity: disabled ? 0.65 : 1 }}
          onMouseEnter={(e)=>{
            if (disabled) return;
            e.currentTarget.style.transform = "translateY(-1px)";
            e.currentTarget.style.filter = "saturate(1.05)";
          }}
          onMouseLeave={(e)=>{
            e.currentTarget.style.transform = "translateY(0px)";
            e.currentTarget.style.filter = "none";
          }}
        >
          {children}
        </button>
      );
    };

    const StatCard = ({ icon, label, value, accent }) => (
      <div className="shadowCard" style={{ padding:14, borderLeft:`6px solid ${accent}`, display:"flex", gap:12, alignItems:"center" }}>
        <div style={{ fontSize:22 }}>{icon}</div>
        <div style={{ display:"flex", flexDirection:"column", gap:3 }}>
          <div className="muted" style={{ fontSize:12, fontWeight:800, letterSpacing:"0.2px" }}>{label}</div>
          <div style={{ fontSize:22, fontWeight:1000 }}>{value}</div>
        </div>
      </div>
    );

    const Banner = ({ type="success", text, onClose }) => {
      const bg = type==="success" ? "#DCFCE7" : type==="error" ? "#FEE2E2" : "#FEF3C7";
      const border = type==="success" ? "#86EFAC" : type==="error" ? "#FCA5A5" : "#FCD34D";
      const color = type==="success" ? "#166534" : type==="error" ? "#991B1B" : "#92400E";
      return (
        <div className="fadeIn" style={{ padding:"10px 12px", borderRadius:12, background:bg, border:`1px solid ${border}`, color, fontWeight:900, display:"flex", justifyContent:"space-between", alignItems:"center", gap:10 }}>
          <span>{text}</span>
          {onClose && <button className="linkBtn" onClick={onClose} style={{ fontWeight:1000, color }}>✕</button>}
        </div>
      );
    };

    const Modal = ({ open, title, children, onClose }) => {
      if (!open) return null;
      return (
        <div className="modalOverlay" onClick={onClose}>
          <div className="modalCard" onClick={(e)=>e.stopPropagation()}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
              <div style={{ fontWeight:1000, fontSize:16 }}>{title}</div>
              <button className="linkBtn" onClick={onClose} style={{ fontWeight:1000 }}>✕</button>
            </div>
            {children}
          </div>
        </div>
      );
    };

    const Toggle = ({ label, value, onChange }) => (
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 0", borderBottom:"1px solid rgba(31,56,100,0.08)" }}>
        <div style={{ fontWeight:800 }}>{label}</div>
        <div
          onClick={()=>onChange(!value)}
          style={{
            width:50, height:28, borderRadius:999, background: value ? COLORS.teal : "rgba(148,163,184,0.6)",
            padding:3, cursor:"pointer", transition:"all .2s", display:"flex", alignItems:"center",
            justifyContent: value ? "flex-end" : "flex-start"
          }}
        >
          <div style={{ width:22, height:22, borderRadius:"50%", background:"#fff", boxShadow:"0 6px 18px rgba(0,0,0,0.18)" }} />
        </div>
      </div>
    );

    const Avatar = ({ name }) => {
      const parts = name.split(" ").filter(Boolean);
      const initials = (parts[0]?.[0] || "") + (parts[1]?.[0] || "");
      return (
        <div style={{
          width:34, height:34, borderRadius:"50%",
          background:"rgba(46,117,182,0.18)",
          display:"flex", alignItems:"center", justifyContent:"center",
          fontWeight:1000, color: COLORS.primaryNavy
        }}>
          {initials.toUpperCase()}
        </div>
      );
    };

    // ---------- Charts ----------
    const BarChart = ({ title, labels, data, colors }) => {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(()=>{
        const ctx = canvasRef.current?.getContext("2d");
        if (!ctx) return;

        if (chartRef.current) {
          chartRef.current.destroy();
          chartRef.current = null;
        }

        chartRef.current = new Chart(ctx, {
          type: "bar",
          data: {
            labels,
            datasets: [{
              label: title,
              data,
              backgroundColor: colors,
              borderRadius: 8,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display:false },
              title: { display:true, text:title, color:"#0f172a", font:{ weight:"bold", size:14 } }
            },
            scales: {
              x: { grid: { display:false } },
              y: { grid: { color:"rgba(31,56,100,0.08)" } }
            }
          }
        });

        return ()=>{
          if (chartRef.current) {
            chartRef.current.destroy();
            chartRef.current = null;
          }
        };
      }, [title, labels.join("|"), data.join("|"), colors.join("|")]);

      return (
        <div className="shadowCard" style={{ padding:14, height:320 }}>
          <div style={{ height:"100%" }}>
            <canvas ref={canvasRef}></canvas>
          </div>
        </div>
      );
    };

    const LineChart = ({ title, labels, data }) => {

          <div style={{ height:"100%" }}>
            <canvas ref={canvasRef}></canvas>
          </div>

          chartRef.current = null;
        }

        chartRef.current = new Chart(ctx, {
          type: "doughnut",
          data: {
            labels,
            datasets: [{
              data,
              backgroundColor: colors,
              borderWidth: 0,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position:"bottom" },
              title: { display:true, text:title, color:"#0f172a", font:{ weight:"bold", size:14 } }
            }
          }
        });

        return ()=>{
          if (chartRef.current) {
            chartRef.current.destroy();
            chartRef.current = null;
          }
        };
      }, [title, labels.join("|"), data.join("|"), colors.join("|")]);

      return (
        <div className="shadowCard" style={{ padding:14, height:320 }}>
          <div style={{ height:"100%" }}>
            <canvas ref={canvasRef}></canvas>
          </div>
        </div>
      );
    };

    const PieChart = ({ title, labels, data, colors }) => {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(()=>{
        const ctx = canvasRef.current?.getContext("2d");
        if (!ctx) return;

        if (chartRef.current) {
          chartRef.current.destroy();
          chartRef.current = null;
        }

        chartRef.current = new Chart(ctx, {
          type: "pie",
          data: {
            labels,
            datasets: [{
              data,
              backgroundColor: colors,
              borderWidth: 0,
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { position:"bottom" },
              title: { display:true, text:title, color:"#0f172a", font:{ weight:"bold", size:14 } }
            }
          }
        });

        return ()=>{
          if (chartRef.current) {
            chartRef.current.destroy();
            chartRef.current = null;
          }
        };
      }, [title, labels.join("|"), data.join("|"), colors.join("|")]);

      return (
        <div className="shadowCard" style={{ padding:14, height:320 }}>

    function IssueBookPage() {
      const [stuId, setStuId] = useState("");
      const [isbn, setIsbn] = useState("");
      const [issueDate, setIssueDate] = useState("2026-02-24");
      const [dueDate, setDueDate] = useState("2026-03-10");
      const [msg, setMsg] = useState("");

      useEffect(()=>{
        const d = new Date(issueDate + "T00:00:00");
        if (!isNaN(d.getTime())) {
          d.setDate(d.getDate() + 14);
          const iso = d.toISOString().slice(0,10);
          setDueDate(iso);
        }
      }, [issueDate]);

      const issue = ()=>{
        if (!stuId.trim() || !isbn.trim()) {
          setMsg("error:Please fill Student ID and Book ISBN.");
          return;
        }
        setMsg("success:✅ Book issued successfully! Due date: " + dueDate);
        window.setTimeout(()=>{
          setStuId(""); setIsbn(""); setIssueDate("2026-02-24");
          setMsg("");
        }, 2000);
      };

      return (
        <div style={{ display:"flex", justifyContent:"center" }}>
          <div className="shadowCard" style={{ width:"min(520px, 96vw)", padding:16 }}>
            <div style={{ fontWeight:1000, fontSize:16, marginBottom:10 }}>Issue Book</div>

            <div style={{ display:"grid", gap:10 }}>
              <div>
                <div className="muted" style={{ fontSize:12, fontWeight:900, marginBottom:6 }}>Student ID</div>
                <input className="input" placeholder="e.g. STU001" value={stuId} onChange={(e)=>setStuId(e.target.value)} />
              </div>
              <div>
                <div className="muted" style={{ fontSize:12, fontWeight:900, marginBottom:6 }}>Book ISBN</div>
                <input className="input" placeholder="e.g. 978-0-679-82411-8" value={isbn} onChange={(e)=>setIsbn(e.target.value)} />
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                <div>
                  <div className="muted" style={{ fontSize:12, fontWeight:900, marginBottom:6 }}>Issue Date</div>
                  <input className="input" type="date" value={issueDate} onChange={(e)=>setIssueDate(e.target.value)} />
                </div>
                <div>
                  <div className="muted" style={{ fontSize:12, fontWeight:900, marginBottom:6 }}>Due Date</div>
                  <input className="input" type="date" value={dueDate} onChange={(e)=>setDueDate(e.target.value)} />
                </div>
              </div>

              <Button variant="teal" onClick={issue} style={{ background: COLORS.teal }}>Issue Book</Button>

              {msg && msg.startsWith("success:") && <Banner type="success" text={msg.replace("success:","")} onClose={()=>setMsg("")} />}
              {msg && msg.startsWith("error:") && <Banner type="error" text={msg.replace("error:","")} onClose={()=>setMsg("")} />}
            </div>
          </div>
        </div>
      );
    }

    function ReturnBookPage() {
      const [isbn, setIsbn] = useState("");
      const [returnDate, setReturnDate] = useState("2026-02-24");
      const [cond, setCond] = useState("Good");

      const proc = ()=>{
        if (!isbn.trim()) {

          return;

        setMsg("success:✅ Book returned. Coins credited to student!");
        window.setTimeout(()=>{
          setIsbn(""); setReturnDate("2026-02-24"); setCond("Good"); setMsg("");

      return (

    // ---------- App Root ----------
    function App() {
      const [currentScreen, setCurrentScreen] = useState("login"); // login | admin | librarian | principal | management

      const onLogin = (u)=>{
        if (u.role==="School Admin") setCurrentScreen("admin");
        else if (u.role==="Librarian") setCurrentScreen("librarian");
        else if (u.role==="Principal") setCurrentScreen("principal");
        else setCurrentScreen("management");
      };

      const onLogout = ()=>{
        setCurrentScreen("login");
      };

      if (currentScreen==="login") return <LoginScreen onLogin={onLogin} />;
      if (currentScreen==="admin") return <SchoolAdminApp onLogout={onLogout} />;
      if (currentScreen==="librarian") return <LibrarianApp onLogout={onLogout} />;
      if (currentScreen==="principal") return <PrincipalApp onLogout={onLogout} />;
      return <ManagementApp onLogout={onLogout} />;
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
